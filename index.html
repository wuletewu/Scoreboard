<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scoreboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scoreboard">

    <div class="team">
      <div class="team-label">HOME</div>
      <div class="display">
        <div class="score" id="home-score">12</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="addScore('home', 1)">+1</button>
        <button class="btn" onclick="addScore('home', 2)">+2</button>
        <button class="btn" onclick="addScore('home', 3)">+3</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="team">
      <div class="team-label">GUEST</div>
      <div class="display">
        <div class="score" id="guest-score">5</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="addScore('guest', 1)">+1</button>
        <button class="btn" onclick="addScore('guest', 2)">+2</button>
        <button class="btn" onclick="addScore('guest', 3)">+3</button>
      </div>
    </div>

  </div>

  <script src="index.js"></script>

</body>
</html>
